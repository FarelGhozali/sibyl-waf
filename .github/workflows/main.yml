name: Sibyl-WAF Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GO_VERSION: "1.25"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint (Sibyl-Brain)
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: sibyl-brain
          args: --timeout=5m

      - name: golangci-lint (Sibyl-Proxy)
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: sibyl-proxy
          args: --timeout=5m

      - name: Run Tests (Sibyl-Brain)
        working-directory: ./sibyl-brain
        run: go test -v -race ./...

      - name: Run Tests (Sibyl-Proxy)
        working-directory: ./sibyl-proxy
        run: go test -v -race ./...

  security-audit:
    name: Security Audit (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (Sibyl-Brain)
        working-directory: ./sibyl-brain
        run: govulncheck ./...

      - name: Run govulncheck (Sibyl-Proxy)
        working-directory: ./sibyl-proxy
        run: govulncheck ./...

  build-and-publish:
    name: Build & Publish to GHCR
    needs: [lint-and-test, security-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase GitHub Repository Name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push Sibyl-Brain
        uses: docker/build-push-action@v7
        with:
          context: ./sibyl-brain
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/sibyl-brain:latest
            ghcr.io/${{ env.REPO }}/sibyl-brain:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Sibyl-Proxy
        uses: docker/build-push-action@v7
        with:
          context: ./sibyl-proxy
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/sibyl-proxy:latest
            ghcr.io/${{ env.REPO }}/sibyl-proxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
