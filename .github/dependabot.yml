version: 2
updates:
  # ========================================================
  # GOLANG DEPENDENCIES
  # ========================================================
  - package-ecosystem: "gomod"
    directory: "/sibyl-brain"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-brain)"

  - package-ecosystem: "gomod"
    directory: "/sibyl-proxy"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-proxy)"

  # ========================================================
  # DOCKER BASE IMAGES
  # ========================================================
  - package-ecosystem: "docker"
    directory: "/sibyl-brain"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker-brain)"

  - package-ecosystem: "docker"
    directory: "/sibyl-proxy"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker-proxy)"

  # ========================================================
  # GITHUB ACTIONS
  # ========================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
